<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Azure: Papales</title>
    <!-- Modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --primary-color: #38bdf8;
            --primary-hover: #7dd3fc;
            --user-msg: #0ea5e9;
            --agent-msg: #334155;
            --border-color: #475569;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
        }

        .chat-container {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.75rem;
            margin: 0;
            color: var(--primary-color);
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            margin: 0.5rem 0 0;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid var(--border-color);
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-box::-webkit-scrollbar { width: 8px; }
        .chat-box::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 12px; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 12px; }

        .message {
            padding: 1rem;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .agent {
            background-color: var(--agent-msg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
        }

        input {
            flex: 1;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        button {
            padding: 0 1.5rem;
            border-radius: 12px;
            border: none;
            background-color: var(--primary-color);
            color: var(--bg-color);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: var(--agent-msg);
            padding: 1rem;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            margin-top: 0.5rem;
        }

        .dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>Papales</h1>
            <p class="subtitle">Azure Foundry Agent</p>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message agent">¡Hola! Soy Papales, tu agente inteligente de Azure. Puedes hacerme cualquier pregunta para probar mi configuración.</div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Escribe un mensaje..." autocomplete="off">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Allow pressing Enter to send
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message to UI
            addMessage(message, 'user');
            messageInput.value = '';
            
            // Disable input while waiting
            messageInput.disabled = true;
            sendBtn.disabled = true;
            
            // Show typing indicator
            typingIndicator.style.display = 'block';
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addMessage(data.response, 'agent');
                } else {
                    addMessage(`Error: ${data.error}`, 'agent');
                    console.error("Server Error:", data);
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                addMessage('Error de conexión con el servidor local.', 'agent');
            } finally {
                // Re-enable input
                typingIndicator.style.display = 'none';
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
                scrollToBottom();
            }
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            // Basic formatting for newlines
            text = text.replace(/\n/g, '<br>');
            msgDiv.innerHTML = text;
            
            // Insert before typing indicator
            chatBox.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
